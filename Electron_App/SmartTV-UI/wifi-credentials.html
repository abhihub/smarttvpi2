<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart TV WiFi Setup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 2.2rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .header p {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .tv-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            display: block;
        }

        .status-message {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 1rem;
            font-weight: 500;
        }

        .status-message.info {
            background: #e3f2fd;
            color: #1976d2;
            border: 1px solid #bbdefb;
        }

        .status-message.success {
            background: #e8f5e8;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }

        .status-message.error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 1rem;
        }

        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            background: #f9f9f9;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        .checkbox-group label {
            margin: 0;
            font-weight: 500;
            color: #666;
            font-size: 0.9rem;
        }

        .button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }

        .button:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
        }

        .button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .button.secondary {
            background: #f5f5f5;
            color: #666;
            border: 2px solid #e0e0e0;
        }

        .button.secondary:hover {
            background: #eeeeee;
        }

        .network-scan {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .network-scan h3 {
            color: #495057;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .network-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: white;
        }

        .network-item {
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background-color 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .network-item:hover {
            background: #f8f9fa;
        }

        .network-item:last-child {
            border-bottom: none;
        }

        .network-item.selected {
            background: #e3f2fd;
            color: #1976d2;
        }

        .network-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .network-security {
            font-size: 0.9rem;
            color: #666;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .signal-strength {
            display: inline-block;
            width: 20px;
            height: 12px;
            background: #ddd;
            border-radius: 2px;
            position: relative;
            margin-left: 5px;
        }

        .signal-strength.excellent {
            background: #4caf50;
        }

        .signal-strength.good {
            background: #8bc34a;
        }

        .signal-strength.fair {
            background: #ff9800;
        }

        .signal-strength.poor {
            background: #f44336;
        }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: #667eea;
            transition: width 0.3s ease;
            border-radius: 3px;
        }

        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            color: #666;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
                margin: 10px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .tv-icon {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="tv-icon">📺</span>
            <h1>Smart TV WiFi Setup</h1>
            <p>Connect your Smart TV to your home WiFi network</p>
        </div>

        <div id="statusMessage" class="status-message info">
            Please select your WiFi network and enter the password
        </div>

        <div class="network-scan">
            <h3>📡 Available Networks</h3>
            <div id="networkList" class="network-list">
                <div class="loading-spinner"></div>
            </div>
            <button class="button secondary" onclick="scanNetworks()" style="margin-top: 15px;">
                🔄 Refresh Networks
            </button>
        </div>

        <form id="wifiForm">
            <div class="form-group">
                <label for="ssid">Network Name (SSID)</label>
                <input type="text" id="ssid" name="ssid" required placeholder="Select from list or enter manually">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your WiFi password">
                <div class="checkbox-group">
                    <input type="checkbox" id="showPassword" onchange="togglePasswordVisibility()">
                    <label for="showPassword">Show password</label>
                </div>
            </div>

            <div class="form-group">
                <label for="security">Security Type</label>
                <select id="security" name="security">
                    <option value="WPA">WPA/WPA2 (Recommended)</option>
                    <option value="WEP">WEP (Legacy)</option>
                    <option value="OPEN">Open (No Security)</option>
                </select>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="hidden" name="hidden">
                <label for="hidden">This is a hidden network</label>
            </div>

            <button type="submit" class="button" id="connectButton">
                🔗 Connect Smart TV
            </button>
        </form>

        <div id="connectionProgress" style="display: none;">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <p id="progressText">Connecting to network...</p>
        </div>

        <div class="footer">
            <p>Make sure your Smart TV and phone are nearby for setup</p>
        </div>
    </div>

    <script>
        let selectedNetwork = null;
        let availableNetworks = [];

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            console.log('WiFi credentials page loaded');
            scanNetworks();
            
            // Set up form submission
            document.getElementById('wifiForm').addEventListener('submit', handleFormSubmit);
        });

        // Scan for available networks
        async function scanNetworks() {
            const networkList = document.getElementById('networkList');
            networkList.innerHTML = '<div class="loading-spinner"></div>';
            
            try {
                // Simulate network scan
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                // In real implementation, this would use iwlist or similar
                const networks = await getAvailableNetworks();
                displayNetworks(networks);
                
            } catch (error) {
                console.error('Network scan failed:', error);
                networkList.innerHTML = '<div style="text-align: center; color: #666; padding: 20px;">Network scan failed. Please try again.</div>';
            }
        }

        // Get available networks (mock implementation)
        async function getAvailableNetworks() {
            // In real implementation, this would execute:
            // iwlist wlan0 scan | grep -E "(ESSID|Encryption|Quality)"
            
            // Mock data for demonstration
            return [
                { ssid: 'HomeNetwork_5G', security: 'WPA2', signal: 'excellent' },
                { ssid: 'HomeNetwork_2.4G', security: 'WPA2', signal: 'good' },
                { ssid: 'NETGEAR_Guest', security: 'WPA', signal: 'fair' },
                { ssid: 'OpenWiFi', security: 'Open', signal: 'poor' },
                { ssid: 'TP-Link_AC1750', security: 'WPA2', signal: 'good' }
            ];
        }

        // Display networks in the list
        function displayNetworks(networks) {
            availableNetworks = networks;
            const networkList = document.getElementById('networkList');
            
            if (networks.length === 0) {
                networkList.innerHTML = '<div style="text-align: center; color: #666; padding: 20px;">No networks found</div>';
                return;
            }
            
            networkList.innerHTML = networks.map(network => `
                <div class="network-item" onclick="selectNetwork('${network.ssid}', '${network.security}')">
                    <div>
                        <div class="network-name">${network.ssid}</div>
                        <div class="network-security">
                            ${network.security === 'Open' ? '🔓' : '🔒'} ${network.security}
                            <span class="signal-strength ${network.signal}"></span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Select a network from the list
        function selectNetwork(ssid, security) {
            selectedNetwork = { ssid, security };
            
            // Update form fields
            document.getElementById('ssid').value = ssid;
            document.getElementById('security').value = security === 'Open' ? 'OPEN' : 'WPA';
            
            // Update UI
            document.querySelectorAll('.network-item').forEach(item => {
                item.classList.remove('selected');
            });
            
            event.target.closest('.network-item').classList.add('selected');
            
            // Show/hide password field based on security
            const passwordGroup = document.getElementById('password').parentElement;
            if (security === 'Open') {
                passwordGroup.style.display = 'none';
                document.getElementById('password').removeAttribute('required');
            } else {
                passwordGroup.style.display = 'block';
                document.getElementById('password').setAttribute('required', 'required');
            }
        }

        // Toggle password visibility
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const showPasswordCheckbox = document.getElementById('showPassword');
            
            if (showPasswordCheckbox.checked) {
                passwordInput.type = 'text';
            } else {
                passwordInput.type = 'password';
            }
        }

        // Handle form submission
        async function handleFormSubmit(event) {
            event.preventDefault();
            
            const formData = new FormData(event.target);
            const wifiData = {
                ssid: formData.get('ssid'),
                password: formData.get('password'),
                security: formData.get('security'),
                hidden: formData.get('hidden') === 'on'
            };
            
            console.log('Submitting WiFi credentials:', wifiData);
            
            // Validate form
            if (!wifiData.ssid.trim()) {
                showStatus('Please enter a network name', 'error');
                return;
            }
            
            if (wifiData.security !== 'OPEN' && !wifiData.password.trim()) {
                showStatus('Please enter the network password', 'error');
                return;
            }
            
            // Start connection process
            await connectToWiFi(wifiData);
        }

        // Connect to WiFi
        async function connectToWiFi(wifiData) {
            const connectButton = document.getElementById('connectButton');
            const progressSection = document.getElementById('connectionProgress');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            
            // Disable form and show progress
            connectButton.disabled = true;
            progressSection.style.display = 'block';
            
            try {
                // Step 1: Validate credentials
                progressFill.style.width = '20%';
                progressText.textContent = 'Validating network credentials...';
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                // Step 2: Configure network
                progressFill.style.width = '40%';
                progressText.textContent = 'Configuring network settings...';
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                // Step 3: Connect to network
                progressFill.style.width = '60%';
                progressText.textContent = 'Connecting to ' + wifiData.ssid + '...';
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                // Step 4: Test connection
                progressFill.style.width = '80%';
                progressText.textContent = 'Testing internet connection...';
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                // Step 5: Complete setup
                progressFill.style.width = '100%';
                progressText.textContent = 'Setup complete!';
                await new Promise(resolve => setTimeout(resolve, 500));
                
                // In real implementation, this would:
                // 1. Write to wpa_supplicant.conf
                // 2. Restart network services
                // 3. Test connectivity
                // 4. Stop soft AP
                // 5. Notify main application
                
                await saveWiFiCredentials(wifiData);
                
                showStatus('Successfully connected to ' + wifiData.ssid + '!', 'success');
                
                // Show success message and redirect
                setTimeout(() => {
                    showCompletionMessage();
                }, 2000);
                
            } catch (error) {
                console.error('WiFi connection failed:', error);
                progressSection.style.display = 'none';
                connectButton.disabled = false;
                showStatus('Connection failed. Please check your credentials and try again.', 'error');
            }
        }

        // Save WiFi credentials
        async function saveWiFiCredentials(wifiData) {
            // In real implementation, this would save credentials to:
            // 1. wpa_supplicant configuration
            // 2. Network manager configuration
            // 3. Application settings
            
            // For now, we'll use localStorage for demo
            localStorage.setItem('wifiCredentials', JSON.stringify(wifiData));
            
            // Simulate API call to main application
            try {
                const response = await fetch('/api/wifi-connect', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(wifiData)
                });
                
                if (!response.ok) {
                    throw new Error('Network configuration failed');
                }
                
                console.log('WiFi credentials saved successfully');
            } catch (error) {
                console.log('API call failed, using local storage fallback');
                // In real implementation, this would write directly to system files
            }
        }

        // Show completion message
        function showCompletionMessage() {
            document.body.innerHTML = `
                <div class="container">
                    <div class="header">
                        <span class="tv-icon">✅</span>
                        <h1>Setup Complete!</h1>
                        <p>Your Smart TV is now connected to your WiFi network</p>
                    </div>
                    
                    <div class="status-message success">
                        Connection successful! Your Smart TV is starting up.
                    </div>
                    
                    <div style="text-align: center; margin: 30px 0;">
                        <h3>What's Next?</h3>
                        <p style="margin: 15px 0; color: #666;">
                            • Your TV will restart and connect to your network<br>
                            • Download the mobile app to control your TV<br>
                            • The setup network will be automatically disabled
                        </p>
                    </div>
                    
                    <div class="footer">
                        <p>You can now close this page</p>
                    </div>
                </div>
            `;
        }

        // Show status message
        function showStatus(message, type) {
            const statusElement = document.getElementById('statusMessage');
            statusElement.textContent = message;
            statusElement.className = `status-message ${type}`;
        }

        // Handle network errors
        window.addEventListener('offline', () => {
            showStatus('Network connection lost. Please check your connection.', 'error');
        });

        window.addEventListener('online', () => {
            showStatus('Network connection restored.', 'success');
        });
    </script>
</body>
</html>
